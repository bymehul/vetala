name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack package tarball
        run: npm pack

      - name: Upload package tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"
          if-no-files-found: error

  smoke-package:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download package tarball
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: artifacts

      - name: List downloaded artifact files
        run: node -e "const fs=require('node:fs'); const path=require('node:path'); function walk(dir){ for(const entry of fs.readdirSync(dir,{withFileTypes:true})){ const target=path.join(dir,entry.name); if(entry.isDirectory()) walk(target); else console.log(target);} } walk('artifacts');"

      - name: Smoke test installed package
        run: node scripts/smoke-installed-cli.mjs artifacts
