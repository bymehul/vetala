name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package tarball
        run: npm pack --dry-run
